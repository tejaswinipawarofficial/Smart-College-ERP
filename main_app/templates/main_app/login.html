{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart College ERP | Login</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="{% static 'image/favicon1.ico' %}">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="{% static 'plugins/fontawesome-free/css/all.min.css' %}">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg,
                    #4f46e5,
                    #2563eb,
                    #0ea5e9,
                    #7c3aed);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: relative;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            animation: floatBlob 12s infinite alternate ease-in-out;
        }

        body::before {
            width: 350px;
            height: 350px;
            background: rgba(255, 255, 255, .25);
            top: -120px;
            left: -120px;
        }

        body::after {
            width: 300px;
            height: 300px;
            background: rgba(0, 255, 255, .15);
            bottom: -120px;
            right: -120px;
        }

        @keyframes floatBlob {
            from {
                transform: translateY(0px) rotate(0deg);
            }

            to {
                transform: translateY(40px) rotate(25deg);
            }
        }

        .login-card {
            width: 430px;
            max-width: 95%;
            background: rgba(255, 255, 255, .15);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 45px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, .25);
            border: 1px solid rgba(255, 255, 255, .25);
            animation: zoomIn .8s ease;
        }

        @keyframes zoomIn {
            from {
                transform: scale(.7);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .logo-circle {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            margin: auto;
            margin-bottom: 20px;
            background: linear-gradient(135deg,
                    #2563eb,
                    #7c3aed);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 38px;
            box-shadow: 0 15px 35px rgba(37, 99, 235, .45);
            animation: bounceLogo 3s infinite;
        }

        @keyframes bounceLogo {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        h2 {
            text-align: center;
            color: white;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, .8);
            margin-bottom: 35px;
            font-size: 14px;
        }
     .input-group {
    position:relative;
    margin-bottom:22px;
}

.input-group > i.fa-envelope,
.input-group > i.fa-lock {

    position:absolute;
    left:16px;
    top:50%;
    transform:translateY(-50%);

    color:#6c63ff;
    font-size:17px;
    z-index:2;

}


.form-control {
    width:100%;
    height:52px;
    padding:14px 50px 14px 48px;
    border-radius:12px;
    border:none;
    outline:none;
    font-size:15px;
    background:rgba(255,255,255,.92);
    transition:.3s;
}


.toggle-password {
    position:absolute;
    right:16px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#6c63ff;
    font-size:17px;
    z-index:3;
    display:flex;
    align-items:center;
    justify-content:center;
}
.toggle-password i{
    position:static;
    transform:none;
}

.toggle-password:hover {
    color:#2563eb;
}

        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            color: white;
            font-size: 14px;
        }

        .remember-row a {
            color: white;
            text-decoration: none;
        }

        .remember-row a:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg,#2563eb,#7c3aed);
            color: white;
            font-size: 16px;
            font-weight: 600;
            transition: .3s;
            cursor: pointer;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(37,99,235,.45);
        }

        .btn-login:active {
            transform: scale(.97);
        }

        .alert {
            border-radius: 12px;
            animation: fadeIn .5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer-text {
            margin-top: 30px;
            text-align: center;
            color: rgba(255,255,255,.75);
            font-size: 13px;
        }

        @media(max-width:576px){

            .login-card{
                padding:30px 22px;
            }

            h2{
                font-size:26px;
            }

        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo-circle">
        <i class="fas fa-graduation-cap"></i>
    </div>

    <h2>Smart College ERP</h2>

    <div class="subtitle">
        Welcome Back! Sign in to continue.
    </div>
        <!-- Error Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger text-center">
                <i class="fas fa-exclamation-circle"></i>
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form action="doLogin/" method="POST">

        {% csrf_token %}

        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input
                type="email"
                class="form-control"
                name="email"
                placeholder="Email Address"
                required>
        </div>

        <div class="input-group">

            <i class="fas fa-lock"></i>

            <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                placeholder="Password"
                required>

            <span class="toggle-password" onclick="togglePassword()">
                <i class="fas fa-eye" id="eyeIcon"></i>
            </span>

        </div>

        <div class="remember-row">

            <div class="form-check">

              <input
class="form-check-input"
type="checkbox"
id="remember"
name="remember">
                <label
                    class="form-check-label"
                    for="remember">

                    Remember Me

                </label>

            </div>

            <a href="{% url 'password_reset' %}">
                Forgot Password?
            </a>

        </div>

        <button class="btn-login" id="loginBtn">

            <i class="fas fa-sign-in-alt"></i>

            Login

        </button>

    </form>

    <div class="footer-text">

Copyright © 2026. All Rights Reserved |

        <br>

    HandCrafted by ❤️ Tejaswini_Pawar


    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

function togglePassword() {

    const password = document.getElementById("password");
    const eye = document.getElementById("eyeIcon");

    if (password.type === "password") {
        password.type = "text";
        eye.classList.remove("fa-eye");
        eye.classList.add("fa-eye-slash");
    } else {
        password.type = "password";
        eye.classList.remove("fa-eye-slash");
        eye.classList.add("fa-eye");
    }

}

document.querySelector("form").addEventListener("submit", function () {

    const btn = document.getElementById("loginBtn");

    btn.innerHTML =
        '<i class="fas fa-spinner fa-spin"></i> Signing In...';

    btn.disabled = true;

});


window.onload = function(){

    document.querySelector(".login-card").animate([

        {
            opacity:0,
            transform:"translateY(40px)"
        },

        {
            opacity:1,
            transform:"translateY(0)"
        }

    ],{

        duration:700,
        easing:"ease-out"

    });

};

</script>

</body>

</html>
